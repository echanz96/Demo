<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>打开韭研公社文章</title>
    <style>
        * {margin:0;padding:0;box-sizing:border-box;font-family:system-ui,-apple-system}
        body{background:#f6f7f9;height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px}
        .wrap{max-width:375px;width:100%;text-align:center}
        .tit{font-size:22px;color:#222;margin-bottom:12px}
        .desc{color:#666;font-size:14px;margin-bottom:40px;line-height:1.7}
        .open-btn{width:230px;height:52px;background:#1976d2;color:#fff;border:none;border-radius:99px;font-size:16px;cursor:pointer;box-shadow:0 3px 12px #1976d233}
        .open-btn:active{transform:scale(0.97)}
        .tip{margin-top:30px;font-size:12px;color:#999}
        .normal-open.hidden,.wechat-open.hidden{display:none}
        .wechat-open{display:none}
        .wechat-open.show{display:block}
        wx-open-launch-app{display:block;width:230px;height:52px;margin:0 auto}
        .wechat-guide{display:none;margin-top:18px;padding:12px 14px;border-radius:12px;background:#fff7e6;color:#8a5a00;font-size:13px;line-height:1.6;text-align:left}
        .wechat-guide.show{display:block}
    </style>
    <script src="https://res.wx.qq.com/open/js/jweixin-1.6.0.js"></script>
</head>
<body>
<div class="wrap">
    <h2 class="tit">在韭研公社App打开文章</h2>
    <p class="desc">点击按钮自动跳转App阅读原文，未安装跳转应用商店</p>
    <button class="open-btn normal-open" id="btn">立即打开App</button>
    <div class="wechat-open hidden" id="wechatOpen">
        <wx-open-launch-app id="wechatLaunchBtn" appid="" extinfo="">
            <script type="text/wxtag-template">
                <style>
                    .wx-open-btn{width:230px;height:52px;background:#1976d2;color:#fff;border:0;border-radius:99px;font-size:16px}
                </style>
                <button class="wx-open-btn">立即打开App</button>
            </script>
        </wx-open-launch-app>
    </div>
    <p class="wechat-guide" id="wechatGuide"></p>
    <p class="tip">微信内使用开放标签唤起，非微信按系统使用Universal Link或App协议</p>
</div>

<script>
const config = {
    articleId:"5b20d42d2ae41cef6e823877463bd8a3fa6d609f0bda9d4c35315957363a9321",
    ulink:"https://ai.jiuyangongshe.com/share/article/5b20d42d2ae41cef6e823877463bd8a3fa6d609f0bda9d4c35315957363a9321",
    androidDeeplink:"jcgs://main?articleId=5b20d42d2ae41cef6e823877463bd8a3fa6d609f0bda9d4c35315957363a9321",
    harmonyDeeplink:"jcgs://main?articleId=5b20d42d2ae41cef6e823877463bd8a3fa6d609f0bda9d4c35315957363a9321",
    androidMarket:"market://details?id=com.jiucaigongshe",
    androidMarketWeb:"https://a.app.qq.com/o/simple.jsp?pkgname=com.jiucaigongshe",
    harmonyMarket:"appmarket://details?id=com.jiucaigongshe",
    harmonyMarketWeb:"https://a.app.qq.com/o/simple.jsp?pkgname=com.jiucaigongshe",
    iosStore:"itms-apps://itunes.apple.com/cn/app/id1514578934?mt=8",
    iosStoreWeb:"https://apps.apple.com/cn/app/id1514578934",
    downUrl:"https://ai.jiuyangongshe.com",
    wechatLaunchAppId:"", // TODO: 填微信开放平台移动应用AppID，不是公众号AppID。
    wechatJsConfigUrl:"" // TODO: 填后端签名接口，返回appId/timestamp/nonceStr/signature。
}
let timer=null;
let marketTimer=null;

const ua=navigator.userAgent||"";
const isAndroid=/Android/i.test(ua);
const isHarmony=/HarmonyOS|OpenHarmony|ArkWeb/i.test(ua);
const isIOS=/iPhone|iPad|iPod/i.test(ua) || (navigator.platform==="MacIntel" && navigator.maxTouchPoints>1);
const isWechat=/MicroMessenger/i.test(ua);
const isMobile=isAndroid||isIOS||isHarmony;

function clearTimers(){
    if(timer){
        clearTimeout(timer);
        timer=null;
    }
    if(marketTimer){
        clearTimeout(marketTimer);
        marketTimer=null;
    }
}

function normalizeTargetUrl(url){
    if(!isMobile) return url;
    try{
        const target=new URL(url);
        if(target.hostname==="ai.jiuyangongshe.com"){
            target.hostname="m-ai.jiuyangongshe.com";
            return target.href;
        }
    }catch(e){}
    return url;
}

function go(url){
    location.href=normalizeTargetUrl(url);
}

function showWechatGuide(text){
    const guide=document.getElementById('wechatGuide');
    if(guide){
        guide.textContent=text||"微信开放标签未能唤起 App，请确认已安装，或点击后续应用商店入口下载。";
        guide.classList.add('show');
    }
}

function fallbackToStore(){
    if(document.hidden) return;
    if(isIOS){
        go(config.iosStore);
        marketTimer=setTimeout(()=>{
            if(!document.hidden) go(config.iosStoreWeb);
        },1200);
        return;
    }
    if(isHarmony){
        go(config.harmonyMarket);
        marketTimer=setTimeout(()=>{
            if(!document.hidden) go(config.harmonyMarketWeb);
        },1200);
        return;
    }
    if(isAndroid){
        go(config.androidMarket);
        marketTimer=setTimeout(()=>{
            if(!document.hidden) go(config.androidMarketWeb);
        },1200);
        return;
    }
    go(config.downUrl);
}

function getPlatform(){
    if(isIOS) return "ios";
    if(isHarmony) return "harmony";
    if(isAndroid) return "android";
    return "web";
}

function getNativeOpenUrl(){
    if(isIOS) return config.ulink;
    if(isHarmony) return config.harmonyDeeplink;
    if(isAndroid) return config.androidDeeplink;
    return config.ulink;
}

function getWechatExtInfo(){
    return JSON.stringify({
        articleId:config.articleId,
        deeplink:getNativeOpenUrl(),
        platform:getPlatform()
    });
}

function showWechatOpenButton(){
    const normalOpen=document.getElementById('btn');
    const wechatOpen=document.getElementById('wechatOpen');
    if(normalOpen) normalOpen.classList.add('hidden');
    if(wechatOpen){
        wechatOpen.classList.remove('hidden');
        wechatOpen.classList.add('show');
    }
}

function setupWechatLaunch(){
    if(!isWechat) return;
    showWechatOpenButton();

    const launchBtn=document.getElementById('wechatLaunchBtn');
    if(!config.wechatLaunchAppId||!config.wechatJsConfigUrl){
        showWechatGuide("微信内直接唤起 App 需要配置 wechatLaunchAppId 和 wechatJsConfigUrl；当前未配置，无法启用 wx-open-launch-app。");
        return;
    }
    if(!window.wx){
        showWechatGuide("微信 JS-SDK 加载失败，暂时无法使用微信开放标签唤起 App。");
        return;
    }

    launchBtn.setAttribute("appid",config.wechatLaunchAppId);
    launchBtn.setAttribute("extinfo",getWechatExtInfo());
    launchBtn.addEventListener('launch',clearTimers);
    launchBtn.addEventListener('error',()=>{
        showWechatGuide("未检测到可打开的 App，正在跳转应用商店。");
        fallbackToStore();
    });

    const signUrl=config.wechatJsConfigUrl+(config.wechatJsConfigUrl.includes("?")?"&":"?")+"url="+encodeURIComponent(location.href.split("#")[0]);
    fetch(signUrl,{credentials:"include"})
        .then(res=>res.ok?res.json():Promise.reject(new Error("wechat signature request failed")))
        .then(data=>{
            wx.config({
                debug:false,
                appId:data.appId,
                timestamp:data.timestamp,
                nonceStr:data.nonceStr,
                signature:data.signature,
                jsApiList:['checkJsApi'],
                openTagList:['wx-open-launch-app']
            });
            wx.error(()=>{
                showWechatGuide("微信 JS-SDK 签名校验失败，无法使用微信开放标签唤起 App。");
            });
        })
        .catch(()=>{
            showWechatGuide("微信 JS-SDK 签名获取失败，无法使用微信开放标签唤起 App。");
        });
}

document.getElementById('btn').onclick=()=>{
    if(isWechat) return;
    clearTimers();
    const start=Date.now();

    go(getNativeOpenUrl());

    // 页面仍可见且超过阈值，说明大概率未唤起App，转应用商店。
    timer=setTimeout(()=>{
        if(!document.hidden && Date.now()-start>=1800){
            fallbackToStore();
        }
    },2000)
}

// App/商店被唤起后页面通常会切后台，此时取消兜底跳转。
document.addEventListener('visibilitychange',()=>{
    if(document.hidden) clearTimers()
})
window.addEventListener('pagehide',clearTimers);
setupWechatLaunch();
</script>
</body>
</html>
