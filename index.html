<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>打开韭研公社文章</title>
    <style>
        * {margin:0;padding:0;box-sizing:border-box;font-family:system-ui,-apple-system}
        body{background:#f6f7f9;height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px}
        .wrap{max-width:375px;width:100%;text-align:center}
        .tit{font-size:22px;color:#222;margin-bottom:12px}
        .desc{color:#666;font-size:14px;margin-bottom:40px;line-height:1.7}
        .open-btn{width:230px;height:52px;background:#1976d2;color:#fff;border:none;border-radius:99px;font-size:16px;cursor:pointer;box-shadow:0 3px 12px #1976d233}
        .open-btn:active{transform:scale(0.97)}
        .tip{margin-top:30px;font-size:12px;color:#999}
    </style>
</head>
<body>
<div class="wrap">
    <h2 class="tit">在韭研公社App打开文章</h2>
    <p class="desc">点击按钮自动跳转App阅读原文，未安装跳转应用商店</p>
    <button class="open-btn" id="btn">立即打开App</button>
    <p class="tip">iOS依靠Universal Link唤起，安卓优先应用协议</p>
</div>

<script>
const config = {
    ulink:"https://ai.jiuyangongshe.com/share/article/5b20d42d2ae41cef6e823877463bd8a3fa6d609f0bda9d4c35315957363a9321",
    schema:"jiuyangongshe://",
    androidMarket:"market://details?id=com.jiucaigongshe",
    androidMarketWeb:"https://a.app.qq.com/o/simple.jsp?pkgname=com.jiucaigongshe",
    iosStore:"itms-apps://itunes.apple.com/cn/app/id1514578934?mt=8",
    downUrl:"https://ai.jiuyangongshe.com"
}
let timer=null;
let marketTimer=null;

const ua=navigator.userAgent||"";
const isAndroid=/Android/i.test(ua);
const isIOS=/iPhone|iPad|iPod/i.test(ua) || (navigator.platform==="MacIntel" && navigator.maxTouchPoints>1);

function clearTimers(){
    if(timer){
        clearTimeout(timer);
        timer=null;
    }
    if(marketTimer){
        clearTimeout(marketTimer);
        marketTimer=null;
    }
}

function go(url){
    location.href=url;
}

function fallbackToStore(){
    if(document.hidden) return;
    if(isIOS){
        go(config.iosStore);
        return;
    }
    if(isAndroid){
        go(config.androidMarket);
        marketTimer=setTimeout(()=>{
            if(!document.hidden) go(config.androidMarketWeb);
        },1200);
        return;
    }
    go(config.downUrl);
}

document.getElementById('btn').onclick=()=>{
    clearTimers();
    const start=Date.now();

    // iOS优先Universal Link；Android优先App Scheme。
    if(isIOS){
        go(config.ulink);
    }else if(isAndroid){
        go(config.schema);
    }else{
        go(config.ulink);
    }

    // 页面仍可见且超过阈值，说明大概率未唤起App，转应用商店。
    timer=setTimeout(()=>{
        if(!document.hidden && Date.now()-start>=1800){
            fallbackToStore();
        }
    },2000)
}

// App/商店被唤起后页面通常会切后台，此时取消兜底跳转。
document.addEventListener('visibilitychange',()=>{
    if(document.hidden) clearTimers()
})
window.addEventListener('pagehide',clearTimers);
</script>
</body>
</html>
