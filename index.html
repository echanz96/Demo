<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>打开韭研公社文章</title>
    <style>
        * {margin:0;padding:0;box-sizing:border-box;font-family:system-ui,-apple-system}
        body{background:#f6f7f9;height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px}
        .wrap{max-width:375px;width:100%;text-align:center}
        .tit{font-size:22px;color:#222;margin-bottom:12px}
        .desc{color:#666;font-size:14px;margin-bottom:40px;line-height:1.7}
        .open-btn{width:230px;height:52px;background:#1976d2;color:#fff;border:none;border-radius:99px;font-size:16px;cursor:pointer;box-shadow:0 3px 12px #1976d233}
        .open-btn:active{transform:scale(0.97)}
        .tip{margin-top:30px;font-size:12px;color:#999}
    </style>
</head>
<body>
<div class="wrap">
    <h2 class="tit">在韭研公社App打开文章</h2>
    <p class="desc">点击按钮自动跳转App阅读原文，未安装将引导您前往应用商店</p>
    <button class="open-btn" id="btn">立即打开App</button>
    <p class="tip">未安装时：iOS跳转App Store，安卓跳转应用商店</p>
</div>

<script>
const config = {
    ulink:"https://ai.jiuyangongshe.com/share/article/5b20d42d2ae41cef6e823877463bd8a3fa6d609f0bda9d4c35315957363a9321",
    schema:"jiuyangongshe://",
    downUrl:"https://ai.jiuyangongshe.com",
    // iOS App Store链接
    iosStore:"itms-apps://itunes.apple.com/cn/app/id1514578934?mt=8",
    // 应用商店链接（豆荚商店）
    androidStore:"market://details?id=com.jiucaigongshe",
    // 备用网页版商店链接
    androidStoreWeb:"https://www.coolapk.com/apk/com.jiucaigongshe"
}

let timer=null;
let isAndroid = /android/i.test(navigator.userAgent);
let isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);

document.getElementById('btn').onclick=()=>{
    // iOS设备：优先Universal Link
    if (isIOS) {
        let hasOpened = false;
        const start = Date.now();

        // 监听页面失去焦点（表示App已唤起）
        const onBlur = () => {
            hasOpened = true;
            window.removeEventListener('blur', onBlur);
            document.removeEventListener('visibilitychange', onVisibilityChange);
        };

        const onVisibilityChange = () => {
            if (document.hidden) {
                hasOpened = true;
                window.removeEventListener('blur', onBlur);
                document.removeEventListener('visibilitychange', onVisibilityChange);
            }
        };

        window.addEventListener('blur', onBlur);
        document.addEventListener('visibilitychange', onVisibilityChange);

        // 使用iframe尝试唤起（Universal Link）
        const iframe = document.createElement('iframe');
        iframe.style.display = 'none';
        iframe.src = config.ulink;
        document.body.appendChild(iframe);

        // 超时检测：如果未成功唤起，则跳转App Store
        timer = setTimeout(() => {
            if (!hasOpened) {
                // 跳转App Store
                location.href = config.iosStore;
                // 备用：如果itms-apps协议失败，跳转网页版
                setTimeout(() => {
                    if (!document.hidden) {
                        location.href = "https://apps.apple.com/cn/app/id1514578934";
                    }
                }, 2000);
            }
            // 清理iframe
            if (iframe && iframe.parentNode) {
                iframe.parentNode.removeChild(iframe);
            }
        }, 2500);

        return;
    }

    // Android设备：使用iframe尝试唤起，失败则跳转应用商店
    if (isAndroid) {
        let hasOpened = false;
        const start = Date.now();

        // 监听页面失去焦点（表示App已唤起）
        const onBlur = () => {
            hasOpened = true;
            window.removeEventListener('blur', onBlur);
            document.removeEventListener('visibilitychange', onVisibilityChange);
        };

        const onVisibilityChange = () => {
            if (document.hidden) {
                hasOpened = true;
                window.removeEventListener('blur', onBlur);
                document.removeEventListener('visibilitychange', onVisibilityChange);
            }
        };

        window.addEventListener('blur', onBlur);
        document.addEventListener('visibilitychange', onVisibilityChange);

        // 使用iframe尝试唤起App（避免页面跳转）
        const iframe = document.createElement('iframe');
        iframe.style.display = 'none';
        iframe.src = config.schema;
        document.body.appendChild(iframe);

        // 超时检测：如果未成功唤起，则跳转应用商店
        timer = setTimeout(() => {
            if (!hasOpened) {
                // 尝试跳转应用商店（market://协议）
                try {
                    location.href = config.androidStore;
                    // 如果market://协议失败，2秒后跳转网页版商店
                    setTimeout(() => {
                        if (!document.hidden) {
                            location.href = config.androidStoreWeb;
                        }
                    }, 2000);
                } catch (e) {
                    // 直接跳转网页版商店
                    location.href = config.androidStoreWeb;
                }
            }
            // 清理iframe
            if (iframe && iframe.parentNode) {
                iframe.parentNode.removeChild(iframe);
            }
        }, 2500);

        return;
    }

    // 其他设备（PC等）：直接跳转落地页
    location.href = config.downUrl;
}

// 切后台清除定时器
document.addEventListener('visibilitychange',()=>{
    if(document.hidden && timer) {
        clearTimeout(timer);
    }
})
</script>
</body>
</html>
